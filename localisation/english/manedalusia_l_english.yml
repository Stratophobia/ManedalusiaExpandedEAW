###MIRAGE IDEAS###
 MDL_hisba_idea_1:0 "Association of Hisbas"
 MDL_hisba_idea_1_desc:0 "A previously only rural institution, the Hisba, or Commune, is a form of collective ownership that split the Manedalusian countryside into districts, each under the purview of local families and villages for cultivation, tending and recreational use. In an attempt to bridge the gap between rural and urban life, the Hisba has been elevated to an official legal code, which similarly enforces communal ownership over land and production in Coltoba itself, as well as all cities under Manedalusian administration."
