 MDL_bop_hermetic_moderate:0 "Hermetic Prevalence"
 MDL_bop_hermetic_total:0 "Hermetic Dominance"
 MDL_favor_traditionalists:0 "Favor the Ash'Ari"
 MDL_favor_traditionalists_desc:0 "Typically seen as the traditionalist, orthodox wing of ash-shuhūd theologians, the Ash'Ari are technically not the oldest sect of organized thought in Manedalusian history, having been formed as a reaction to the prevalence of Mutazilite thought in the aftermath of Sultan Everleaf Al-Rahman's rule. Traditionally supported by the rural agrarian elements of Manedalusian society, Ash'Ari orthodoxy holds great respect for the ritualistic traditions outlined in the Fiqh; it is Ash'Ari influence that has made Manedalusians a literate people for centuries before industrialization, as they believe it essential that members of the congregation write a personal copy of the Book of Revelation at least once in their lives. Ash'Ari believe the material world to be a pragmatic function to exercise universal moral truths, and disregard the importance of Natural Law."
 MDL_favor_hermetics:0 "Favor the Hermetics"
 MDL_favor_hermetics_desc:0 "A persistent undercurrent of ash-shuhūd theology, the Hermetic tradition traces its origins back to the Golden Age of Sailing, when the University of Coltoba reached the zenith of its influence. Though they respect the Fiqh, Hermetics are adamant about the absolute primacy of scripture, and believe communal and ecclesiastical authority should be secondary to individual connection to divinity and truth. Hermetics also believe that all religions are valid, if incomplete paths to Revelation, as Ash-Shahid shows Himself to all creatures in some way, and their esoteric beliefs centering alchemy and astronomy are a byproduct of their belief in empirical observation, and in Natural Law as part of the grand Divine Work."
