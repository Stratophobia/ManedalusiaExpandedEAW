 manedalusia.178.t:0 "A Step In The Right Direction"
 manedalusia.178.d:0 "\"I don't understand\", Mirage said with a heavy frown when she finally came across the Muftia. \"Your Excellency, you would relinquish the clergy's authority? And for what?\"\n\n\"All things have their due and rightful place, Sunset\", replied Qamar. \"And it's become clear to me that our rightful place is in the background of political life, in guiding the good judgement of our communities indirectly.\"\n\nThough Mirage would not dare directly defy the Muftia's will, her decision still haunted her greatly. As they spoke, word had reached most settlements and hamlets around Coltoba that elected mayorships were to be established, in a manner not too dissimilar from how they already elected their muftis. It was unlikely that things would change much in how the folk outside Coltoba went about their regular lives, but Mirage still saw this as a step towards an untested direction. \"I hope you know what you are doing, your Excellency. It would not be the first time we stumbled onto a mistake from poorly thought out reforms.\""
 manedalusia.178.a:0 "\"I'll keep that in mind, Sunset.\""
