###COMPANIES AND CONCERNS###
 MDL_office_of_artillery:0 "Maktab Al-Madfa'iyyah"
 MDL_office_of_artillery_desc:0 "The so-called Office of Artillery is a surprisingly old institution, originally created as a branch of the Sultanate's Levy command. It was made to streamline conscription of skilled woodworkers and engineers to build siege engines for the Sultan's army. The world has changed drastically since the time the Maktab Al-Madfa'iyyah was created, but its purpose is easily fitted into a modern military doctrine."
 MDL_hashm_koltaliba_org:0 "Hashm Koltāliba"
 MDL_hashm_koltaliba_org_desc:0 "Loved and feared, sung and whispered, all across Western Zebrica do creatures speak the name of the Hashm Koltāliba. Officialized as an elite unit of former Colthaginian slaves who converted to the faith in the High Sultanate period, during the Golden Age of Sailing they would be expanded by the Majlis Ash-Shūrā into a fully fledged military force, supplemented with mercenaries, to protect caravans and merchant vessels. The Koltāliba are the most prestigious military organization in Manedalusia, occupying a dual role as both an elite fighting unit, and a commissariat that can be integrated into regular regiments to whip the soldiers into shape."
