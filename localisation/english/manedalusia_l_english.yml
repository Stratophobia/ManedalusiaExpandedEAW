 manedalusia.181.t:0 "The Greatest Illusion"
 manedalusia.181.d:0 "Nadia did not understand why her teacher brought her to the hillside, and was so taken in by the mesmerizing view that it took her a fair few minutes to get it. When he said she was the brightest filly in her class, Nadia had expected more busywork - more reciting, more writing, more repeating over the same excerpts over and over again. But instead, he gave her a single question, and tasked her with finding the answer; that was the extent of his expectation.\n\nOn her own terms, Nadia had spent the better part of a month pouring over the Book of Revelation. Late into the night she read by candlelight, and it took her embarrassingly long to realize her answer would not be written in plain text somewhere in its pages for her to recite. So she read the same passages again and again, hoping to find it. She remembered the words, nearly memorized full pages down to the letter, but nothing came of it. Not until she turned her eyes upwards.\n\nUp on the hill, Coltoba's facade shined in the distance, by the vast blue. A small local graveyard was also visible, one that Nadia's mother made her avoid when she played outside. The teacher's gamble paid off, and the sights triggered in his student a moment of inspiration.\n\n\"So, Nadia,\", he said. \"you've had a lot of time to search for an answer. Do tell me: what is this world's greatest illusion?\"\n\nWhen Nadia first asked her mother about the dead, when she was much younger, she said that the bodies of the dead become the grass. The Book of Revelation had many references to the infite longevity of matter through cycles - how all parts of things, each constituent element, was itself equally and infinitely ancient. The world's design was totalizing in its complexity, in its ability to make individual forms out of the same mass, made to be in perpetual circulation.\n\nOnce it all clicked together, the answer became clear."
 manedalusia.181.a:0 "\"The greatest illusion is that of separation.\""
 manedalusia.182.t:0 "A Literate People"
 manedalusia.182.d:0 "The core of ash-shuhūd theology has always been to connect to the divine perception of Ash-Shahid by studying both His word and His work - to this end, Manedalusians have valued literacy as quintessential long before the needs of industrialization. Our agrarian population and our subjugation by foreign powers made it often impossible to assure basic literacy for the whole population, but with minimal effort from the government and the reinstatement of the Sharī'at Al-Qirā'a, Al-Manedalus is now, for the first time in its history, quantifiably literate in its near entirety, regardless of social standing. This moment marks Manedalusia's undeniable entry into the world stage as a properly modern nation, and our economy will surely only benefit from this development."
 manedalusia.182.a:0 "Splendid."
